<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word O'yini - Officer Games</title>
    <link rel="stylesheet" href="game-styles.css">
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1>📝 Word O'yini</h1>
            <div class="game-stats">
                <span>⏱️ Vaqt: <span id="timer">60</span>s</span>
                <span>🎯 Ball: <span id="score">0</span></span>
                <span>📊 Daraja: <span id="level">1</span></span>
            </div>
        </div>

        <div class="game-area">
            <div class="word-editor">
                <div class="toolbar">
                    <button class="tool-btn" onclick="formatText('bold')">Bold</button>
                    <button class="tool-btn" onclick="formatText('italic')">Italic</button>
                    <button class="tool-btn" onclick="formatText('underline')">Underline</button>
                    <button class="tool-btn" onclick="changeColor()">Rang</button>
                </div>

                <div id="editor" class="editor" contenteditable="true"></div>
            </div>

            <div class="task-panel">
                <h3>Vazifa:</h3>
                <p id="task">Matnni Bold qilib yozing: "Salom Dunyo"</p>
                <button class="btn btn-check" onclick="checkAnswer()">Tekshirish</button>
            </div>
        </div>

        <div class="game-footer">
            <button class="btn btn-quit" onclick="quitGame()">Chiqish</button>
        </div>
    </div>

    <script src="word-game.js"></script>
</body>
</html>
